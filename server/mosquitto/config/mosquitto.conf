persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout

# Listener per connessioni MQTT
listener 1883
protocol mqtt

# Listener per WebSocket (opzionale, utile per web apps)
listener 9001
protocol websockets

# Configurazione di sicurezza
# Il broker richiede autenticazione con username e password.
# Il file delle password viene generato da setup/generate_mqtt_passwd.sh
# oppure manualmente con:  mosquitto_passwd -c /mosquitto/config/passwd <username>
allow_anonymous false
password_file /mosquitto/config/passwd

# Per disabilitare l'autenticazione (solo sviluppo locale senza Docker):
# allow_anonymous true

# ACL (Access Control List) - opzionale
# acl_file /mosquitto/config/acl

# Massima dimensione messaggio (in bytes)
message_size_limit 0

# QoS
max_qos 2

# Mantenimento connessioni
max_keepalive 65535

# Log level: error, warning, notice, information, debug, subscribe, unsubscribe
log_type error
log_type warning
log_type notice
log_type information

# Timestamp nei log
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S
